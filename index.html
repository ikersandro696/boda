:root{
  --vino:#2a0812; --vino-osc:#14040a; --papel:#e2cf96; --tinta:#2b2016;
  --oro:#d8c08e; --oro-tenue:rgba(216,192,142,.55);
}
*{box-sizing:border-box; margin:0; padding:0}
html,body{min-height:100%}
body{
  background:radial-gradient(ellipse 120% 70% at 50% 30%, var(--vino) 0%, var(--vino-osc) 78%);
  color:var(--oro); font-family:Georgia, 'Times New Roman', serif;
  display:flex; flex-direction:column; align-items:center;
  padding:26px 14px 60px; overflow-x:hidden; position:relative;
}
.particulas{position:fixed; inset:0; pointer-events:none; z-index:0}
.p{position:absolute; background:radial-gradient(circle, rgba(235,205,150,.9), rgba(235,205,150,0) 70%);
   border-radius:50%; animation:subir linear infinite;}
@keyframes subir{ from{transform:translateY(105vh)} to{transform:translateY(-8vh)} }
@media (prefers-reduced-motion: reduce){ .p{animation:none; opacity:.25} .tablita{animation:none} }
header{ text-align:center; z-index:1; margin-bottom:8px }
.fecha-eyebrow{ font-family:'Cinzel', serif; letter-spacing:.42em; font-size:.72rem; color:var(--oro-tenue); text-transform:uppercase }
h1{ font-family:'Rye', serif; font-weight:400; font-size:clamp(1.5rem, 6.4vw, 2.3rem); line-height:1.25; margin:.35em 0 .15em; color:var(--oro); text-shadow:0 0 22px rgba(216,192,142,.25) }
.fecha{ font-family:'Rye', serif; font-size:1.05rem; letter-spacing:.25em }
.tablita{ position:relative; width:min(400px, 96vw); margin-top:14px; z-index:1; animation:flotar 5.5s ease-in-out infinite }
@keyframes flotar{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.tablita svg.forma{ width:100%; display:block; filter:drop-shadow(0 16px 22px rgba(0,0,0,.55)) }
.contenido{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; padding:21% 13% 15%; color:var(--tinta) }
.ojo{ width:52px; margin-bottom:2px; opacity:.9 }
.pregunta{ font-family:'Cinzel', serif; font-size:.82rem; letter-spacing:.14em; text-transform:uppercase; text-align:center; margin-bottom:12px }
label{ font-family:'Cinzel', serif; font-size:.68rem; letter-spacing:.18em; text-transform:uppercase; align-self:flex-start; margin:6px 0 4px }
input[type=text]{ width:100%; padding:9px 12px; font-family:Georgia, serif; font-size:1rem; color:var(--tinta);
  background:rgba(255,255,255,.28); border:1.5px solid rgba(43,32,22,.55); border-radius:6px; outline:none; }
input[type=text]:focus{ border-color:var(--tinta); box-shadow:0 0 0 2px rgba(43,32,22,.18) }
.stepper{ display:flex; align-items:center; gap:14px; margin-top:2px }
.stepper button{ width:38px; height:38px; border-radius:50%; border:1.5px solid var(--tinta); background:transparent;
  font-size:1.25rem; color:var(--tinta); cursor:pointer; line-height:1; }
.stepper button:active{ background:rgba(43,32,22,.14) }
.stepper .num{ font-family:'Rye', serif; font-size:1.5rem; min-width:2ch; text-align:center }
.botones{ display:flex; flex-direction:column; gap:9px; width:100%; margin-top:16px }
.btn{ font-family:'Rye', serif; font-size:1.02rem; padding:12px 10px; border-radius:8px; cursor:pointer;
  border:2px solid var(--tinta); width:100%; letter-spacing:.05em; transition:transform .12s ease; }
.btn:active{ transform:scale(.97) }
.btn.si{ background:var(--tinta); color:var(--papel) }
.btn.no{ background:transparent; color:var(--tinta) }
.btn[disabled]{ opacity:.55; cursor:default }
.btn:focus-visible, .stepper button:focus-visible{ outline:3px solid #7a5cff; outline-offset:2px }
.marcador{ z-index:1; width:min(400px,96vw); margin-top:26px; text-align:center }
.marcador h2{ font-family:'Cinzel', serif; font-size:.78rem; letter-spacing:.32em; text-transform:uppercase; color:var(--oro-tenue); margin-bottom:12px }
.piedras{ display:flex; gap:12px; justify-content:center }
.piedra{ flex:1; max-width:180px; padding:16px 8px 13px; border:1.5px solid rgba(216,192,142,.4);
  border-radius:14px 14px 5px 5px; background:rgba(216,192,142,.06); }
.piedra .n{ font-family:'Rye', serif; font-size:2.15rem; line-height:1 }
.piedra .t{ font-family:'Cinzel', serif; font-size:.62rem; letter-spacing:.2em; text-transform:uppercase; margin-top:7px; color:var(--oro-tenue) }
.estado{ margin-top:14px; font-size:.85rem; min-height:1.4em; color:var(--oro) }
.gracias{ font-family:'Cinzel', serif; letter-spacing:.06em }
details{ margin-top:16px; color:var(--oro-tenue); font-size:.85rem }
summary{ cursor:pointer; font-family:'Cinzel', serif; letter-spacing:.15em; font-size:.7rem; text-transform:uppercase }
#lista{ list-style:none; margin-top:10px; text-align:left; max-width:320px; margin-inline:auto }
#lista li{ padding:5px 2px; border-bottom:1px dashed rgba(216,192,142,.25) }
.respaldo{ margin-top:18px; font-size:.8rem; color:var(--oro-tenue); text-align:center; max-width:340px; line-height:1.5 }
.respaldo a{ color:var(--oro) }
</style>
</head>

  for (var i=0;i<26;i++){
    var d = document.createElement('div');
    d.className='p';
    var s = 3+Math.random()*6;
    d.style.width=d.style.height=s+'px';
    d.style.left=(Math.random()*100)+'vw';
    d.style.animationDuration=(9+Math.random()*16)+'s';
    d.style.animationDelay=(-Math.random()*20)+'s';
    d.style.opacity=(0.25+Math.random()*0.5).toFixed(2);
    cont.appendChild(d);
  }

  var personas = 1;
  var num = document.getElementById('personas');
  document.getElementById('mas').onclick = function(){ personas=Math.min(12,personas+1); num.textContent=personas; };
  document.getElementById('menos').onclick = function(){ personas=Math.max(1,personas-1); num.textContent=personas; };

  var estado = document.getElementById('estado');
  var btnSi = document.getElementById('btnSi'), btnNo = document.getElementById('btnNo');

  function bloquear(b){ btnSi.disabled = b; btnNo.disabled = b; }
  try { if (localStorage.getItem('bodaNE_respondio')) {
    bloquear(true);
    estado.innerHTML = '<span class="gracias">Ya registramos tu respuesta desde este teléfono. 🖤</span>';
  } } catch(e){}

  async function cargar(){
    try{
      var r = await fetch(API);
      var d = await r.json();
      if (!d.ok) throw new Error('respuesta invalida');
      document.getElementById('numSi').textContent = d.si;
      document.getElementById('numNo').textContent = d.no;
      var ul = document.getElementById('lista');
      ul.innerHTML='';
      (d.lista||[]).forEach(function(v){
        var li = document.createElement('li');
        li.textContent = (v.si ? '🎃 ' : '🖤 ') + (v.n||'Invitado') + (v.si ? ' — '+v.p+(v.p>1?' personas':' persona') : ' — no podrá venir');
        ul.appendChild(li);
      });
    }catch(e){
      document.getElementById('numSi').textContent = '·';
      document.getElementById('numNo').textContent = '·';
    }
  }

  async function responder(asiste){
    var nombre = document.getElementById('nombre').value.trim();
    if (!nombre){ estado.textContent = 'Escribe tu nombre para confirmar.'; document.getElementById('nombre').focus(); return; }
    bloquear(true);
    estado.textContent = 'Guardando…';
    try{
      var r = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },  // evita preflight CORS
        body: JSON.stringify({ nombre: nombre, asiste: asiste, personas: personas })
      });
      var d = await r.json();
      if (!d.ok) throw new Error(d.error || 'no se guardo');
      try { localStorage.setItem('bodaNE_respondio', '1'); } catch(e){}
      estado.innerHTML = asiste
        ? '<span class="gracias">✨ ¡Registrado! Te esperamos el 31 de octubre.</span>'
        : '<span class="gracias">🖤 Gracias por avisar. Les mandamos un abrazo.</span>';
      await cargar();
    }catch(e){
      bloquear(false);
      estado.textContent = 'No se pudo guardar. Intenta de nuevo o usa el enlace de abajo.';
      document.getElementById('respaldo').hidden = false;
    }
  }
  btnSi.onclick = function(){ responder(true); };
  btnNo.onclick = function(){ responder(false); };

  cargar();
  setInterval(cargar, 20000);
})();
</script>
</body>
</html>
